<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Auckland Notes</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .note { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 15px; position: relative; }
        .delete-btn { color: red; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <h2>Digital Notepad</h2>
    <textarea id="noteInput" placeholder="Write something..."></textarea>
    <button onclick="saveNote()">Save Note</button>

    <div id="notesContainer"></div>

    <script>
        // Load notes from browser storage on startup
        document.addEventListener('DOMContentLoaded', displayNotes);

        function saveNote() {
            const input = document.getElementById('noteInput');
            if (!input.value) return;

            const notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
            notes.push({ id: Date.now(), text: input.value });
            localStorage.setItem('myNotes', JSON.stringify(notes));
            
            input.value = '';
            displayNotes();
        }

        function displayNotes() {
            const container = document.getElementById('notesContainer');
            const notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
            
            container.innerHTML = notes.map(note => `
                <div class="note">
                    <span class="delete-btn" onclick="deleteNote(${note.id})">Delete</span>
                    <p>${note.text}</p>
                </div>
            `).reverse().join('');
        }

        function deleteNote(id) {
            let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
            notes = notes.filter(note => note.id !== id);
            localStorage.setItem('myNotes', JSON.stringify(notes));
            displayNotes();
        }
    </script>
</body>
</html>
