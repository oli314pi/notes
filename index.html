<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Auckland Notes</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .note { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 15px; position: relative; }
        .delete-btn { color: red; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <h2>Digital Notepad</h2>
    <textarea id="noteInput" placeholder="Write something..."></textarea>
    <button onclick="saveNote()">Save Note</button>

    <div id="notesContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. REPLACE THESE WITH YOUR ACTUAL CREDENTIALS FROM SUPABASE
    const SUPABASE_URL = 'https://your-project-url.supabase.co';
    const SUPABASE_KEY = 'your-anon-key-here';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.addEventListener('DOMContentLoaded', loadNotes);

    async function saveNote() {
        const input = document.getElementById('noteInput');
        if (!input.value) return;

        // Save to the cloud instead of local storage
        const { error } = await supabase
            .from('notes')
            .insert([{ content: input.value }]);

        if (error) {
            console.error('Error saving:', error);
        } else {
            input.value = '';
            loadNotes();
        }
    }

    async function loadNotes() {
        const container = document.getElementById('notesContainer');
        
        // Fetch from the cloud
        const { data: notes, error } = await supabase
            .from('notes')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error('Error loading:', error);
            return;
        }

        container.innerHTML = notes.map(note => `
            <div class="note">
                <span class="delete-btn" onclick="deleteNote('${note.id}')">Delete</span>
                <p>${note.content}</p>
            </div>
        `).join('');
    }

    async function deleteNote(id) {
        const { error } = await supabase
            .from('notes')
            .delete()
            .eq('id', id);

        if (error) console.error('Error deleting:', error);
        else loadNotes();
    }
</script>
   
</body>
</html>
